<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EA SPORTS PRO SIMULATOR - Hockey</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel Standalone CDN to compile React JSX directly in-browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #020617;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-300 antialiased font-sans">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Custom SVG components to replace Lucide-React dependency locally
        const Shield = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
        );

        const ClipboardPaste = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
                <path d="M9 12h6"/><path d="M9 16h6"/>
            </svg>
        );

        const Users = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
        );

        const Activity = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
        );

        const Trophy = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
                <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
                <path d="M4 22h16"/>
                <path d="M10 14.66V17c0 .55-.45 1-1 1H4v2h16v-2h-5c-.55 0-1-.45-1-1v-2.34"/>
                <path d="M12 2a7.7 7.7 0 0 1 7.54 8H4.46A7.7 7.7 0 0 1 12 2z"/>
            </svg>
        );

        const Play = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="currentColor">
                <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
        );

        const Pause = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="6" y="4" width="4" height="16"/>
                <rect x="14" y="4" width="4" height="16"/>
            </svg>
        );

        const RotateCcw = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="1 4 1 10 7 10"/>
                <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
            </svg>
        );

        const Clock = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
            </svg>
        );

        const Sliders = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/>
                <line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/>
                <line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/>
                <line x1="2" y1="14" x2="6" y2="14"/><line x1="10" y1="8" x2="14" y2="8"/>
                <line x1="18" y1="16" x2="22" y2="16"/>
            </svg>
        );

        const ChevronRight = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="9 18 15 12 9 6"/>
            </svg>
        );

        const Copy = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
        );

        const Check = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        );

        // Strict sorting order for positions in the LNH rosters
        const POS_ORDER = [
          'C', 'C/AD', 'C/AG', 'AD/C', 'AG/C', 'AD', 'AG', 'DD', 'DG', 'D', 'G'
        ];

        const COUNTRIES = ['Canada', 'États-Unis', 'Suède', 'Finlande', 'Russie', 'Allemagne', 'Suisse', 'Tchéquie'];

        function App() {
          const [activeTab, setActiveTab] = useState('prep'); // 'prep', 'alignment', 'live', 'stats'
          const [gameStarted, setGameStarted] = useState(false);
          const [teamNames, setTeamNames] = useState({ home: '', away: '' });
          const [teamColors, setTeamColors] = useState({ home: '#ea0a2a', away: '#00205b' });

          // Inputs initialized as strictly blank
          const [importSkaters, setImportSkaters] = useState({ home: '', away: '' });
          const [importGoalies, setImportGoalies] = useState({ home: '', away: '' });
          const [importStatus, setImportStatus] = useState({ home: '', away: '' });

          // Loaded database of players
          const [players, setPlayers] = useState([]);
          
          // Clean empty configurations for lineups
          const [alignments, setAlignments] = useState({
            home: { forwards: Array(12).fill(null), defense: Array(6).fill(null), goalies: { starter: null, backup: null } },
            away: { forwards: Array(12).fill(null), defense: Array(6).fill(null), goalies: { starter: null, backup: null } }
          });
          const [alignmentTeam, setAlignmentTeam] = useState('home');

          // Timing and simulation systems variables
          const [simSpeed, setSimSpeed] = useState(150); 
          const [timeRemaining, setTimeRemaining] = useState(1200); 
          const [isRunning, setIsRunning] = useState(false);
          const [showIntermission, setShowIntermission] = useState(false);
          const [eventsLog, setEventsLog] = useState([]);

          // Metrics trackers
          const [uiState, setUiState] = useState({
            homeScore: 0, awayScore: 0, period: 1, isOT: false, isShootout: false,
            homeShots: 0, awayShots: 0, homeHits: 0, awayHits: 0, homeBlocks: 0, awayBlocks: 0,
            targetHomeShots: 30, targetAwayShots: 30,
            homeFOW: 0, awayFOW: 0, faceoffsTotalGoal: 50,
            homePIM: 0, awayPIM: 0, homePPO: 0, awayPPO: 0, homePPG: 0, awayPPG: 0,
            currentLineHome: { f: 0, d: 0 }, currentLineAway: { f: 0, d: 0 }
          });

          // Shootout states
          const [shootoutState, setShootoutState] = useState({
            round: 1, currentShooterTeam: 'away', homeGoals: 0, awayGoals: 0, homeAttempts: 0, awayAttempts: 0, active: false
          });

          const [copiedTableId, setCopiedTableId] = useState(null);

          const parseRawRosters = (tid) => {
            try {
              const skatersText = importSkaters[tid].trim();
              const goaliesText = importGoalies[tid].trim();
              
              if (!skatersText && !goaliesText) {
                setImportStatus(prev => ({ ...prev, [tid]: 'Erreur: Les cases sont vides.' }));
                return;
              }

              const parsedSkaters = skatersText.split('\n').map((line, idx) => {
                if (!line.trim()) return null;
                const cols = line.split(/,|\t/).map(s => s.trim());
                if (cols.length < 3) return null;
                const name = cols[0];
                const pos = cols[1].toUpperCase();
                const ovr = parseInt(cols[2]) || 80;
                const style = cols[3] || 'Polyvalent';
                const phy = parseInt(cols[4]) || 80;
                const tir = parseInt(cols[5]) || 80;
                const cre = parseInt(cols[6]) || 80;
                const def = parseInt(cols[7]) || 80;
                const pat = parseInt(cols[8]) || 80;
                const off = parseInt(cols[9]) || 80;
                const man = parseInt(cols[10]) || 80;

                return {
                  id: `${tid}-sk-${idx}-${Math.random().toString(36).substr(2, 4)}`,
                  tid, name, pos, ovr, attrs: { style, phy, tir, cre, def, pat, off, man },
                  stats: { mj: 0, b: 0, a: 0, pts: 0, pm: 0, pun: 0 }
                };
              }).filter(Boolean);

              const parsedGoalies = goaliesText.split('\n').map((line, idx) => {
                if (!line.trim()) return null;
                const cols = line.split(/,|\t/).map(s => s.trim());
                if (cols.length < 3) return null;
                const name = cols[0];
                const pos = 'G';
                const ovr = parseInt(cols[2]) || 80;
                const style = cols[3] || 'Hybride';
                const pot = cols[4] || 'Moyen';
                const ref = parseInt(cols[5]) || 80;
                const mit = parseInt(cols[6]) || 80;
                const posit = parseInt(cols[7]) || 80;
                const con = parseInt(cols[8]) || 80;
                const jeu = parseInt(cols[9]) || 80;

                return {
                  id: `${tid}-g-${idx}-${Math.random().toString(36).substr(2, 4)}`,
                  tid, name, pos, ovr, age: 21 + Math.floor(idx * 2) % 15, country: COUNTRIES[idx % COUNTRIES.length],
                  attrs: { style, pot, ref, mit, posit, con, jeu },
                  stats: { mj: 0, ma: 0, v: 0, d: 0, nd: 0, pm: 0, moy: '0.00', pctArrets: '.000', tc: 0, arrets: 0, bc: 0, dp: 0 }
                };
              }).filter(Boolean);

              const allParsed = [...parsedSkaters, ...parsedGoalies];
              if (allParsed.length === 0) {
                setImportStatus(prev => ({ ...prev, [tid]: 'Erreur: Format de texte invalide.' }));
                return;
              }

              setPlayers(prev => [...prev.filter(p => p.tid !== tid), ...allParsed]);
              
              const align = {
                forwards: Array(12).fill(null),
                defense: Array(6).fill(null),
                goalies: { starter: null, backup: null }
              };

              setAlignments(prev => ({ ...prev, [tid]: align }));
              setImportStatus(prev => ({ ...prev, [tid]: `Succès ! ${parsedSkaters.length} patineurs & ${parsedGoalies.length} gardiens chargés.` }));
            } catch (e) {
              setImportStatus(prev => ({ ...prev, [tid]: 'Erreur lors de la lecture.' }));
            }
          };

          const processImports = () => {
            parseRawRosters('home');
            parseRawRosters('away');
            setActiveTab('alignment');
          };

          const getPosOrder = (pos) => {
            const idx = POS_ORDER.indexOf(pos);
            return idx === -1 ? 99 : idx;
          };

          const isPlayerAssigned = (tid, pid) => {
            const align = alignments[tid];
            if (!align) return false;
            return align.forwards.includes(pid) || align.defense.includes(pid) || align.goalies.starter === pid || align.goalies.backup === pid;
          };

          const togglePlayerInAlignment = (tid, player) => {
            setAlignments(prev => {
              const align = { ...prev[tid] };
              const pid = player.id;

              if (align.forwards.includes(pid)) {
                align.forwards = align.forwards.map(x => x === pid ? null : x);
                return { ...prev, [tid]: align };
              }
              if (align.defense.includes(pid)) {
                align.defense = align.defense.map(x => x === pid ? null : x);
                return { ...prev, [tid]: align };
              }
              if (align.goalies.starter === pid) {
                align.goalies.starter = null;
                return { ...prev, [tid]: align };
              }
              if (align.goalies.backup === pid) {
                align.goalies.backup = null;
                return { ...prev, [tid]: align };
              }

              const isGoalie = player.pos === 'G';
              const isDef = ['D', 'DD', 'DG'].includes(player.pos);

              if (isGoalie) {
                if (!align.goalies.starter) align.goalies.starter = pid;
                else if (!align.goalies.backup) align.goalies.backup = pid;
              } else if (isDef) {
                const emptyIdx = align.defense.findIndex(x => x === null);
                if (emptyIdx !== -1) align.defense[emptyIdx] = pid;
              } else {
                const emptyIdx = align.forwards.findIndex(x => x === null);
                if (emptyIdx !== -1) align.forwards[emptyIdx] = pid;
              }

              return { ...prev, [tid]: align };
            });
          };

          const autoFillRoster = (tid) => {
            const teamPlayers = players.filter(p => p.tid === tid);
            const fList = teamPlayers.filter(p => ['C', 'C/AD', 'C/AG', 'AG/C', 'AD/C', 'AG', 'AD', 'AG/AD', 'AD/AG'].includes(p.pos)).sort((a,b) => b.ovr - a.ovr);
            const dList = teamPlayers.filter(p => ['D', 'DD', 'DG'].includes(p.pos)).sort((a,b) => b.ovr - a.ovr);
            const gList = teamPlayers.filter(p => p.pos === 'G').sort((a,b) => b.ovr - a.ovr);

            setAlignments(prev => {
              const align = {
                forwards: Array(12).fill(null),
                defense: Array(6).fill(null),
                goalies: { starter: null, backup: null }
              };
              for (let i = 0; i < 12; i++) {
                if (fList[i]) align.forwards[i] = fList[i].id;
              }
              for (let i = 0; i < 6; i++) {
                if (dList[i]) align.defense[i] = dList[i].id;
              }
              if (gList[0]) align.goalies.starter = gList[0].id;
              if (gList[1]) align.goalies.backup = gList[1].id;

              return { ...prev, [tid]: align };
            });
          };

          const clearRoster = (tid) => {
            setAlignments(prev => ({
              ...prev,
              [tid]: { forwards: Array(12).fill(null), defense: Array(6).fill(null), goalies: { starter: null, backup: null } }
            }));
          };

          const confirmAlignmentAndSimulate = () => {
            const foTotal = 40 + Math.floor(Math.random() * 31);
            
            const rollPPO = () => {
              const r = Math.random();
              if (r < 0.10) return 2; 
              if (r < 0.60) return 3; 
              if (r < 0.90) return 4; 
              return 5;              
            };

            const homePPO = rollPPO(); 
            const awayPPO = rollPPO(); 

            const getTargetShots = () => {
              const r = Math.random();
              if (r < 0.15) return Math.floor(Math.random() * 5) + 15; 
              if (r < 0.90) return Math.floor(Math.random() * 16) + 20; 
              return Math.floor(Math.random() * 10) + 36; 
            };

            const targetHomeShots = getTargetShots();
            const targetAwayShots = getTargetShots();

            setUiState({
              homeScore: 0, awayScore: 0, period: 1, isOT: false, isShootout: false,
              homeShots: 0, awayShots: 0, homeHits: 0, awayHits: 0, homeBlocks: 0, awayBlocks: 0,
              targetHomeShots, targetAwayShots,
              homeFOW: 0, awayFOW: 0, faceoffsTotalGoal: foTotal,
              homePIM: awayPPO * 2, awayPIM: homePPO * 2, 
              homePPO: homePPO, awayPPO: awayPPO,
              homePPG: 0, awayPPG: 0,
              currentLineHome: { f: 0, d: 0 }, currentLineAway: { f: 0, d: 0 }
            });

            setPlayers(prev => prev.map(p => {
              if (p.pos === 'G') {
                return {
                  ...p,
                  stats: { mj: 0, ma: 0, v: 0, d: 0, nd: 0, pm: 0, moy: '0.00', pctArrets: '.000', tc: 0, arrets: 0, bc: 0, dp: 0 }
                };
              } else {
                return {
                  ...p,
                  stats: { mj: 0, b: 0, a: 0, pts: 0, pm: 0, pun: 0 }
                };
              }
            }));

            setShootoutState({ round: 1, currentShooterTeam: 'away', homeGoals: 0, awayGoals: 0, homeAttempts: 0, awayAttempts: 0, active: false });
            setTimeRemaining(1200);
            setEventsLog(["--- CLAIRON DE DÉPART - DÉBUT DU MATCH ---"]);
            setGameStarted(true);
            setActiveTab('live');
          };

          useEffect(() => {
            let timer = null;
            if (isRunning && !showIntermission) {
              if (timeRemaining > 0 && !uiState.isShootout) {
                timer = setInterval(() => tickGameSimulation(), simSpeed);
              } else if (timeRemaining === 0 && !uiState.isShootout) {
                handlePeriodPause();
              } else if (uiState.isShootout) {
                timer = setInterval(() => tickShootoutRound(), simSpeed * 5);
              }
            }
            return () => clearInterval(timer);
          }, [isRunning, timeRemaining, showIntermission, simSpeed, uiState, shootoutState]);

          const tickGameSimulation = () => {
            const timeStep = 15; 
            setTimeRemaining(prev => Math.max(0, prev - timeStep));

            const lineChangeChance = 0.25;
            let nextHLine = { ...uiState.currentLineHome };
            let nextALine = { ...uiState.currentLineAway };
            if (Math.random() < lineChangeChance) {
              nextHLine.f = Math.floor(Math.random() * (uiState.isOT ? 2 : 4));
              nextHLine.d = Math.floor(Math.random() * (uiState.isOT ? 2 : 3));
            }
            if (Math.random() < lineChangeChance) {
              nextALine.f = Math.floor(Math.random() * (uiState.isOT ? 2 : 4));
              nextALine.d = Math.floor(Math.random() * (uiState.isOT ? 2 : 3));
            }

            setUiState(prev => ({
              ...prev,
              currentLineHome: nextHLine,
              currentLineAway: nextALine
            }));

            const getIcePlayers = (tid, lf, ld) => {
              const align = alignments[tid];
              const teamSkaters = players.filter(p => p.tid === tid && p.pos !== 'G');
              const startF = lf * 3;
              const startD = ld * 2;
              const onIceIds = [
                align.forwards[startF], align.forwards[startF + 1], align.forwards[startF + 2],
                align.defense[startD], align.defense[startD + 1]
              ].filter(Boolean);
              return teamSkaters.filter(p => onIceIds.includes(p.id));
            };

            const homeIce = getIcePlayers('home', nextHLine.f, nextHLine.d);
            const awayIce = getIcePlayers('away', nextALine.f, nextALine.d);

            if (homeIce.length === 0 || awayIce.length === 0) return;

            let remainingTicks = Math.max(1, timeRemaining / 15);
            if (uiState.period <= 3) remainingTicks += (3 - uiState.period) * 80;
            
            const homeShotProb = uiState.period <= 3 ? Math.max(0, (uiState.targetHomeShots - uiState.homeShots) / remainingTicks) : 0.12;
            const awayShotProb = uiState.period <= 3 ? Math.max(0, (uiState.targetAwayShots - uiState.awayShots) / remainingTicks) : 0.12;

            const processShot = (attackingTeam, shooterIce, goalieTeam) => {
                const shooter = shooterIce[Math.floor(Math.random() * shooterIce.length)];
                const defendingTeam = goalieTeam;
                
                const blockingSkill = (attackingTeam === 'home' ? awayIce : homeIce).reduce((sum, p) => sum + p.attrs.def, 0) / 5;
                if (Math.random() < (blockingSkill / 240)) {
                  setUiState(prev => ({ ...prev, [defendingTeam + 'Blocks']: prev[defendingTeam + 'Blocks'] + 1 }));
                  return;
                }

                setUiState(prev => ({ ...prev, [attackingTeam + 'Shots']: prev[attackingTeam + 'Shots'] + 1 }));
                
                const defGoalieId = alignments[defendingTeam].goalies.starter;
                const goalie = players.find(p => p.id === defGoalieId) || { ovr: 80, attrs: { ref: 80, posit: 80, mit: 80 }, name: 'Gardien' };
                
                const shooterSkill = shooter.attrs.tir || 80;
                const goalieSkill = (goalie.attrs.ref + goalie.attrs.posit + goalie.attrs.mit) / 3 || 80;

                const baseGoalProb = 0.095;
                const skillGap = (shooterSkill - goalieSkill) * 0.003;
                const isGoal = Math.random() < (baseGoalProb + skillGap);

                if (isGoal) {
                  setUiState(prev => ({ ...prev, [attackingTeam + 'Score']: prev[attackingTeam + 'Score'] + 1 }));

                  const helpers = shooterIce.filter(p => p.id !== shooter.id);
                  let assist1 = null;
                  let assist2 = null;
                  const assistRoll = Math.random();

                  if (helpers.length > 0 && assistRoll < 0.75) { 
                    assist1 = helpers[Math.floor(Math.random() * helpers.length)];
                    const remainingHelpers = helpers.filter(p => p.id !== assist1.id);
                    if (remainingHelpers.length > 0 && assistRoll < 0.45) { 
                      assist2 = remainingHelpers[Math.floor(Math.random() * remainingHelpers.length)];
                    }
                  }

                  const assistNames = [];
                  if (assist1) assistNames.push(assist1.name);
                  if (assist2) assistNames.push(assist2.name);
                  const assistString = assistNames.length > 0 ? ` (Aides: ${assistNames.join(', ')})` : ' (sans aide)';

                  addEvent(`[${formatTime(timeRemaining)}] BUT ${attackingTeam === 'home' ? (teamNames.home || 'DOMICILE') : (teamNames.away || 'VISITEUR')}! Marqué par ${shooter.name}${assistString}.`);

                  setPlayers(prev => prev.map(p => {
                    if (p.id === shooter.id) {
                      return { 
                        ...p, 
                        stats: { ...p.stats, b: p.stats.b + 1, pts: p.stats.pts + 1, pm: p.stats.pm + 1 } 
                      };
                    }
                    if (assist1 && p.id === assist1.id) {
                      return { 
                        ...p, 
                        stats: { ...p.stats, a: p.stats.a + 1, pts: p.stats.pts + 1, pm: p.stats.pm + 1 } 
                      };
                    }
                    if (assist2 && p.id === assist2.id) {
                      return { 
                        ...p, 
                        stats: { ...p.stats, a: p.stats.a + 1, pts: p.stats.pts + 1, pm: p.stats.pm + 1 } 
                      };
                    }
                    if (shooterIce.some(teammate => teammate.id === p.id)) {
                      return { 
                        ...p, 
                        stats: { ...p.stats, pm: p.stats.pm + 1 } 
                      };
                    }
                    const opposingIce = attackingTeam === 'home' ? awayIce : homeIce;
                    if (opposingIce.some(opponent => opponent.id === p.id)) {
                      return { 
                        ...p, 
                        stats: { ...p.stats, pm: p.stats.pm - 1 } 
                      };
                    }
                    return p;
                  }));

                  if (uiState.isOT) setTimeRemaining(0);
                }
            };

            if (Math.random() < homeShotProb) processShot('home', homeIce, 'away');
            else if (Math.random() < awayShotProb) processShot('away', awayIce, 'home');

            if (Math.random() < 0.15) {
              const hitTeam = Math.random() < 0.5 ? 'home' : 'away';
              setUiState(prev => ({ ...prev, [hitTeam + 'Hits']: prev[hitTeam + 'Hits'] + 1 }));
            }
          };

          const handlePeriodPause = () => {
            setIsRunning(false);
            setShowIntermission(true);
            addEvent(`--- FIN DE LA PÉRIODE ${uiState.period} ---`);
          };

          const tickShootoutRound = () => {
            const isHomeShooter = shootoutState.currentShooterTeam === 'home';
            const shootingTeamId = shootoutState.currentShooterTeam;
            const defendingTeamId = isHomeShooter ? 'away' : 'home';

            const pool = players.filter(p => p.tid === shootingTeamId && p.pos !== 'G');
            const shooter = pool[Math.floor(Math.random() * pool.length)] || { name: 'Tireur' };
            const goalieId = alignments[defendingTeamId].goalies.starter;
            const goalie = players.find(p => p.id === goalieId) || { name: 'Gardien' };

            const isGoal = Math.random() < 0.32;

            if (isGoal) {
              addEvent(`[FUSILLADE R${shootoutState.round}] BUT! ${shooter.name} marque contre ${goalie.name}.`);
              setShootoutState(prev => ({
                ...prev,
                homeGoals: isHomeShooter ? prev.homeGoals + 1 : prev.homeGoals,
                awayGoals: !isHomeShooter ? prev.awayGoals + 1 : prev.awayGoals
              }));
            } else {
              addEvent(`[FUSILLADE R${shootoutState.round}] ARRÊT! ${goalie.name} bloque le lancer de ${shooter.name}.`);
            }

            setShootoutState(prev => {
              const nextState = { ...prev };
              if (isHomeShooter) nextState.homeAttempts++;
              else nextState.awayAttempts++;

              const isRoundDone = nextState.homeAttempts === nextState.awayAttempts;

              if (isRoundDone) {
                const homeWon = nextState.homeGoals > nextState.awayGoals;
                const tied = nextState.homeGoals === nextState.awayGoals;

                if (nextState.round >= 3 && !tied) {
                  setUiState(u => ({
                    ...u,
                    homeScore: u.homeScore + (homeWon ? 1 : 0),
                    awayScore: u.awayScore + (!homeWon ? 1 : 0),
                    isShootout: false
                  }));
                  setTimeout(() => finalizeGameStats(homeWon), 150);
                  nextState.active = false;
                } else {
                  nextState.round++;
                }
              }

              nextState.currentShooterTeam = isHomeShooter ? 'away' : 'home';
              return nextState;
            });
          };

          const startNextPeriod = () => {
            setShowIntermission(false);
            if (uiState.period < 3) {
              setUiState(prev => ({ ...prev, period: prev.period + 1 }));
              setTimeRemaining(1200);
              setIsRunning(true);
              addEvent(`--- DÉBUT DE LA PÉRIODE ${uiState.period + 1} ---`);
            } else {
              if (uiState.homeScore === uiState.awayScore) {
                setUiState(prev => ({ ...prev, period: 4, isOT: true }));
                setTimeRemaining(300);
                setIsRunning(true);
                addEvent(`--- EN ROUTE VERS LA PROLONGATION (3 CONTRE 3) ---`);
              } else {
                finalizeGameStats();
              }
            }
          };

          const finalizeGameStats = (soHomeWon = null) => {
            setIsRunning(false);
            const homeWon = soHomeWon !== null ? soHomeWon : (uiState.homeScore > uiState.awayScore);
            const isOTorSO = uiState.period >= 4;

            let finalHomeFOW = uiState.homeFOW;
            let finalAwayFOW = uiState.awayFOW;
            const totalRemainingFO = uiState.faceoffsTotalGoal - (finalHomeFOW + finalAwayFOW);
            if (totalRemainingFO > 0) {
              const extraHome = Math.floor(totalRemainingFO * 0.52);
              finalHomeFOW += extraHome;
              finalAwayFOW += (totalRemainingFO - extraHome);
            }

            let finalHomePPG = 0;
            for (let i = 0; i < uiState.homePPO; i++) {
              if (Math.random() < 0.21) finalHomePPG++;
            }
            finalHomePPG = Math.min(finalHomePPG, uiState.homeScore);

            let finalAwayPPG = 0;
            for (let i = 0; i < uiState.awayPPO; i++) {
              if (Math.random() < 0.21) finalAwayPPG++;
            }
            finalAwayPPG = Math.min(finalAwayPPG, uiState.awayScore);

            setUiState(prev => ({
              ...prev,
              homeFOW: finalHomeFOW,
              awayFOW: finalAwayFOW,
              homePPG: finalHomePPG,
              awayPPG: finalAwayPPG
            }));

            const distributePIMToPlayers = (tid, totalPIM) => {
              let remainingMin = totalPIM;
              const distribution = {};
              const teamSkaters = players.filter(p => p.tid === tid && p.pos !== 'G' && isPlayerAssigned(tid, p.id));
              
              teamSkaters.forEach(p => { distribution[p.id] = 0; });

              while (remainingMin > 0 && teamSkaters.length > 0) {
                const selected = teamSkaters[Math.floor(Math.random() * teamSkaters.length)];
                distribution[selected.id] += 2;
                remainingMin -= 2;
              }
              return distribution;
            };

            const homePIMDist = distributePIMToPlayers('home', uiState.homePIM);
            const awayPIMDist = distributePIMToPlayers('away', uiState.awayPIM);

            setPlayers(prev => prev.map(p => {
              const assigned = isPlayerAssigned(p.tid, p.id);
              if (!assigned) return p;

              if (p.pos === 'G') {
                const isStarter = alignments[p.tid].goalies.starter === p.id;
                if (!isStarter) return p;

                const bc = p.tid === 'home' ? uiState.awayScore : uiState.homeScore;
                const tc = p.tid === 'home' ? uiState.awayShots : uiState.homeShots;
                const arrets = Math.max(0, tc - bc);
                const win = (p.tid === 'home' && homeWon) || (p.tid === 'away' && !homeWon);
                const otLoss = isOTorSO && !win;

                return {
                  ...p,
                  stats: {
                    ...p.stats,
                    mj: 1,
                    ma: 1, 
                    v: win ? 1 : 0,
                    d: !win && !otLoss ? 1 : 0,
                    dp: otLoss ? 1 : 0,
                    tc, arrets, bc,
                    moy: bc.toFixed(2),
                    pctArrets: tc > 0 ? (arrets / tc).toFixed(3) : '.000'
                  }
                };
              } else {
                const assignedPIM = p.tid === 'home' ? (homePIMDist[p.id] || 0) : (awayPIMDist[p.id] || 0);
                return {
                  ...p,
                  stats: {
                    ...p.stats,
                    mj: 1,
                    pun: p.stats.pun + assignedPIM
                  }
                };
              }
            }));

            addEvent(`*** PARTIE TERMINÉE. GAGNANT : ${homeWon ? (teamNames.home || 'DOMICILE') : (teamNames.away || 'VISITEUR')} ***`);
            setActiveTab('stats');
          };

          const handleStartNextPeriod = () => {
            if (uiState.period === 4 && uiState.homeScore === uiState.awayScore) {
              setShowIntermission(false);
              setUiState(prev => ({ ...prev, isOT: false, isShootout: true }));
              setShootoutState(s => ({ ...s, active: true }));
              setIsRunning(true);
              addEvent(`--- DEBUT DES TIRS DE BARRAGE ---`);
            } else {
              startNextPeriod();
            }
          };

          const addEvent = (msg) => setEventsLog(prev => [msg, ...prev].slice(0, 50));
          
          const formatTime = (seconds) => {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
          };

            setIsRunning(false);
            setShowIntermission(false);

            setGameStarted(false);

                                <button onClick={() => handleCopyTable(`goalies-table-${tid}`)} className="flex items-center gap-1.5 px-3 py-1.5 bg-white hover:bg-slate-50 text-xs text-slate-700 rounded-lg font-medium transition-all border border-slate-300 shadow-sm">
                                  {copiedTableId === `goalies-table-${tid}` ? <Check className="w-3.5 h-3.5 text-emerald-600"/> : <Copy className="w-3.5 h-3.5 text-slate-500"/>} Copier
                                </button>
                              </div>
                              <div className="overflow-x-auto rounded-xl border border-slate-200 shadow-sm bg-white">
                                <table id={`goalies-table-${tid}`} className="w-full text-left text-[11px] text-slate-700 whitespace-nowrap">
                                  <thead className="text-[10px] text-slate-500 uppercase bg-slate-50 border-b border-slate-200 font-bold tracking-wider">
                                    <tr>
                                      <th className="px-3 py-2">Nom</th>
                                      <th className="px-3 py-2 text-center">Âge</th>
                                      <th className="px-3 py-2 text-center">Pays</th>
                                      <th className="px-3 py-2 text-center">MJ</th>
                                      <th className="px-3 py-2 text-center">MA</th>
                                      <th className="px-3 py-2 text-center text-emerald-600">V</th>
                                      <th className="px-3 py-2 text-center text-red-600">D</th>
                                      <th className="px-3 py-2 text-center text-slate-400">N</th>
                                      <th className="px-3 py-2 text-center text-amber-600">DP</th>
                                      <th className="px-3 py-2 text-center font-bold text-sky-700">Moy</th>
                                      <th className="px-3 py-2 text-center text-sky-600 font-bold">% arrêts</th>
                                      <th className="px-3 py-2 text-center">TC</th>
                                      <th className="px-3 py-2 text-center">Arrêts</th>
                                      <th className="px-3 py-2 text-center">BC</th>
                                    </tr>
                                  </thead>
                                  <tbody className="divide-y divide-slate-100">
                                    {players.filter(p => p.tid === tid && p.pos === 'G' && isPlayerAssigned(p.tid, p.id)).map(p => (
                                      <tr key={p.id} className="hover:bg-slate-50 transition-colors">
                                        <td className="px-3 py-2 font-bold text-slate-900">{p.name}</td>
                                        <td className="px-3 py-2 text-center text-slate-500">{p.age}</td>
                                        <td className="px-3 py-2 text-center text-slate-500">{p.country}</td>
                                        <td className="px-3 py-2 text-center font-medium">{p.stats.mj}</td>
                                        <td className="px-3 py-2 text-center font-medium">{p.stats.ma}</td>
                                        <td className="px-3 py-2 text-center font-bold text-emerald-600">{p.stats.v}</td>
                                        <td className="px-3 py-2 text-center font-bold text-red-600">{p.stats.d}</td>
                                        <td className="px-3 py-2 text-center font-medium text-slate-400">0</td>
                                        <td className="px-3 py-2 text-center font-bold text-amber-600">{p.stats.dp}</td>
                                        <td className="px-3 py-2 text-center font-mono font-bold text-sky-800 bg-sky-50">{p.stats.moy}</td>
                                        <td className="px-3 py-2 text-center font-black text-sky-600 bg-sky-50">{p.stats.pctArrets}</td>
                                        <td className="px-3 py-2 text-center text-slate-600">{p.stats.tc}</td>
                                        <td className="px-3 py-2 text-center text-slate-600">{p.stats.arrets}</td>
                                        <td className="px-3 py-2 text-center text-slate-600 font-bold">{p.stats.bc}</td>
                                      </tr>
                                    ))}
                                  </tbody>
                                </table>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
